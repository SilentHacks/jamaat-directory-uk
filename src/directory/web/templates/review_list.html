{% extends "base.html" %}
{% block title %}Review queue{% endblock %}
{% block content %}
<h2>Review queue ({{ items|length }})</h2>
<table>
  <thead><tr><th>Mosque</th><th>Reason</th><th></th></tr></thead>
  <tbody>
  {% for it in items %}
    <tr>
      <td>{{ it.name or it.source_id }}</td>
      <td class="muted">{{ it.reason or "" }}</td>
      <td><a href="/admin/review/{{ it.source_id }}?key={{ key }}">open</a></td>
    </tr>
  {% else %}
    <tr><td colspan="3" class="muted">Queue empty.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
