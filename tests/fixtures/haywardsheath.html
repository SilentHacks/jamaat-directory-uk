<!doctype html>
<html lang="en">
<body>
  <!-- Trimmed from https://www.haywardsheathmosque.co.uk/ (Mid Sussex Islamic
       Centre): a server-rendered, single-day, prayers-down-the-rows timetable. -->
  <section id="timetable">
    <table class="w-full border-collapse">
      <thead>
        <tr class="bg-slate-50/50 border-b border-slate-100">
          <th class="p-4 text-left">Waqt</th>
          <th class="p-4">Begin</th>
          <th class="p-4 text-right">Iqamah</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr id="row-Fajr">
          <td class="waqt-name">Fajr</td>
          <td class="text-center whitespace-nowrap">2:50 am</td>
          <td class="text-right whitespace-nowrap">3:45 am</td>
        </tr>
        <tr id="row-Sunrise">
          <td class="waqt-name">Sunrise</td>
          <td class="text-center whitespace-nowrap">4:45 am</td>
          <td class="text-right whitespace-nowrap">Sunrise</td>
        </tr>
        <tr id="row-Zuhr">
          <td class="waqt-name">Zuhr</td>
          <td class="text-center whitespace-nowrap">1:09 pm</td>
          <td class="text-right whitespace-nowrap">1:30 pm</td>
        </tr>
        <tr id="row-Asr">
          <td class="waqt-name">Asr</td>
          <td class="text-center whitespace-nowrap">6:38 pm</td>
          <td class="text-right whitespace-nowrap">7:15 pm</td>
        </tr>
        <tr id="row-Maghrib">
          <td class="waqt-name">Maghrib</td>
          <td class="text-center whitespace-nowrap">9:20 pm</td>
          <td class="text-right whitespace-nowrap">9:25 pm</td>
        </tr>
        <tr id="row-Isha">
          <td class="waqt-name">Isha</td>
          <td class="text-center whitespace-nowrap">10:39 pm</td>
          <td class="text-right whitespace-nowrap">11:00 pm</td>
        </tr>
      </tbody>
    </table>
  </section>
</body>
</html>
